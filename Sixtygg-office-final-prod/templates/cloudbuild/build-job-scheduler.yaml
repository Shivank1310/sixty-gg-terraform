# ============================================================
# Cloud Build — job-scheduler
# AWS Equivalent: templates/codebuild/build-job-scheduler.yaml
# NOTE: job-scheduler me values.yaml + worker-values.yaml + jobs-values.yaml
#       teeno update hote hain (same as gamification)
# ============================================================
steps:
  - name: 'bash'
    id: 'generate-config-values'
    entrypoint: 'bash'
    secretEnv: ['ENV_JOB_SCHEDULER']
    args:
      - '-c'
      - |
        echo "$$ENV_JOB_SCHEDULER" | awk 'BEGIN {
          print "configMap:\n  enabled: true\n  data:"
        } {
          for (i = 1; i <= NF; i++) {
            if ($i ~ /^[^:]+:$/ && (i < NF)) {
              printf "    %s %s\n", $i, $(i+1)
              i++
            } else {
              print "    " $i
            }
          }
        }' > config-values.yaml
        echo "Generated config-values.yaml:"
        cat config-values.yaml
        cp config-values.yaml chart/

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME'

  - name: 'mikefarah/yq:4.45.1'
    id: 'update-image-tags'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        yq e ".image.tag = \"$COMMIT_SHA\"" -i chart/values.yaml
        yq e ".image.tag = \"$COMMIT_SHA\"" -i chart/worker-values.yaml
        yq e ".image.tag = \"$COMMIT_SHA\"" -i chart/jobs-values.yaml

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/sixtygg-dev-env-job-scheduler/versions/latest
      env: 'ENV_JOB_SCHEDULER'

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

