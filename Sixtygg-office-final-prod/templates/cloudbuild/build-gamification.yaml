========================================================================
# ============================================================
# Cloud Build — gamification
# AWS Equivalent: templates/codebuild/build-gamification.yaml
# ============================================================
steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME'

  # AWS Equivalent: install phase
  # echo "$ENV_GAMIFICATION" | awk '...' > config-values.yaml
  # cp config-values.yaml chart/
  - name: 'bash'
    id: 'generate-config-values'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "$$ENV_GAMIFICATION" | awk 'BEGIN {
          print "configMap:\n  enabled: true\n  data:"
        } {
          for (i = 1; i <= NF; i++) {
            if ($i ~ /^[^:]+:$/ && (i < NF)) {
              printf "    %s %s\n", $i, $(i+1)
              i++
            } else {
              print "    " $i
            }
          }
        }' > config-values.yaml
        echo "Generated config-values.yaml:"
        cat config-values.yaml
        cp config-values.yaml chart/
    secretEnv: ['ENV_GAMIFICATION']

  # AWS Equivalent: post_build phase
  # wget yq + ./yq e ".image.tag = \"$IMAGE_TAG\"" -i chart/values.yaml
  # ./yq e ".image.tag = \"$IMAGE_TAG\"" -i chart/worker-values.yaml
  # ./yq e ".image.tag = \"$IMAGE_TAG\"" -i chart/jobs-values.yaml
  - name: 'mikefarah/yq:4.45.1'
    id: 'update-image-tags'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        yq e ".image.tag = \"$COMMIT_SHA\"" -i chart/values.yaml
        yq e ".image.tag = \"$COMMIT_SHA\"" -i chart/worker-values.yaml
        yq e ".image.tag = \"$COMMIT_SHA\"" -i chart/jobs-values.yaml

# AWS Equivalent: environment_variables PARAMETER_STORE entries
# ENV_GAMIFICATION from /app/env-gamification-${account_name}-${environment}
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/sixtygg-dev-env-gamification/versions/latest
      env: 'ENV_GAMIFICATION'

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME:latest'

options:
  # AWS Equivalent: build_compute_type = "BUILD_GENERAL1_MEDIUM"
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

